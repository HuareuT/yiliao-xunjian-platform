<!doctype html>

<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>医疗巡诊系统 - 巡诊信息登记</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
    <style>
      body {
        background-color: #f1f5f9;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[800px] bg-white rounded-3xl shadow-2xl p-10">
      <div class="flex items-center justify-between mb-10">
        <div class="flex items-center gap-4">
          <div
            class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-100"
          >
            <iconify-icon
              class="text-white text-3xl"
              icon="solar:clipboard-list-bold"
            ></iconify-icon>
          </div>
          <div>
            <h1 class="text-3xl font-bold text-slate-800">巡诊信息登记</h1>
            <p class="text-slate-500">请先填写本次巡诊保障的基础背景信息</p>
          </div>
        </div>
        <a
          class="text-blue-600 hover:text-blue-700 flex items-center gap-1 font-medium"
          href="login.html"
        >
          <iconify-icon icon="solar:logout-2-bold"></iconify-icon>
          <span>返回登录</span>
        </a>
      </div>
      <div class="grid grid-cols-2 gap-8 mb-12">
        <div class="space-y-2 relative group">
          <label class="block text-sm font-semibold text-slate-700">保障类型</label>
          <div class="relative w-full">
            <input
              type="text"
              id="type"
              class="w-full px-5 py-4 pr-12 rounded-2xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
              placeholder="请选择或输入保障类型"
              onfocus="showTypeSuggestions()"
              oninput="filterTypeSuggestions(this.value)"
              onblur="hideTypeSuggestions()"
              autocomplete="off"
            />
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors"
            >
              <iconify-icon icon="solar:alt-arrow-down-bold-duotone" class="text-xl"></iconify-icon>
            </div>
            <div
              id="type-suggestions"
              class="absolute left-0 right-0 top-full mt-2 bg-white border border-slate-200 rounded-2xl shadow-xl z-50 max-h-56 overflow-y-auto hidden custom-scrollbar"
            >
              <!-- 选项列表 -->
            </div>
          </div>
        </div>
        <div class="space-y-2 relative group">
          <label class="block text-sm font-semibold text-slate-700">保障地点</label>
          <div class="relative w-full">
            <input
              type="text"
              id="location"
              class="w-full px-5 py-4 pr-12 rounded-2xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
              placeholder="请选择或输入保障地点"
              onfocus="showLocationSuggestions()"
              oninput="filterLocationSuggestions(this.value)"
              onblur="hideLocationSuggestions()"
              autocomplete="off"
            />
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors"
            >
              <iconify-icon icon="solar:alt-arrow-down-bold-duotone" class="text-xl"></iconify-icon>
            </div>
            <div
              id="location-suggestions"
              class="absolute left-0 right-0 top-full mt-2 bg-white border border-slate-200 rounded-2xl shadow-xl z-50 max-h-56 overflow-y-auto hidden custom-scrollbar"
            >
              <!-- 选项列表 -->
            </div>
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-slate-700">保障人数</label>
          <input
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
            id="count"
            placeholder="请输入预计保障人数"
            type="number"
          />
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-slate-700">保障对象</label>
          <input
            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all"
            id="target"
            placeholder="如：某部全体官兵"
            type="text"
          />
        </div>
      </div>
      <div class="flex justify-end">
        <button
          class="group px-10 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-2xl shadow-xl shadow-blue-100 flex items-center gap-3 transition-all transform hover:translate-x-1"
          onclick="nextStep()"
        >
          <span class="text-lg">下一步</span>
          <iconify-icon
            class="text-2xl group-hover:translate-x-1 transition-transform"
            icon="solar:alt-arrow-right-bold-duotone"
          ></iconify-icon>
        </button>
      </div>
    </div>
    <script>
      const typeCandidates = ["日常巡诊", "演习保障", "训练保障", "其他"];
      const locationCandidates = ["大学城", "江津", "其他"];

      // 保障类型下拉建议
      function showTypeSuggestions() {
        const container = document.getElementById("type-suggestions");
        const input = document.getElementById("type");
        renderTypeSuggestions(input.value);
        container.classList.remove("hidden");
      }

      function filterTypeSuggestions(val) {
        renderTypeSuggestions(val);
      }

      function renderTypeSuggestions(val) {
        const container = document.getElementById("type-suggestions");
        const filtered = typeCandidates.filter((c) => c.toLowerCase().includes(val.toLowerCase()));
        if (filtered.length > 0) {
          container.innerHTML = filtered
            .map(
              (c) => `
                    <div class="px-5 py-3 cursor-pointer hover:bg-slate-50 hover:text-blue-600 transition-colors text-sm text-slate-700 text-left"
                         onmousedown="selectType('${c}')">
                        ${c}
                    </div>
                `,
            )
            .join("");
        } else {
          container.innerHTML = `
                    <div class="px-5 py-3 text-xs text-slate-400 text-center">
                        无匹配类型
                    </div>
                `;
        }
      }

      function selectType(val) {
        const input = document.getElementById("type");
        input.value = val;
        document.getElementById("type-suggestions").classList.add("hidden");
      }

      function hideTypeSuggestions() {
        setTimeout(() => {
          const container = document.getElementById("type-suggestions");
          if (container) {
            container.classList.add("hidden");
          }
        }, 200);
      }

      // 保障地点下拉建议
      function showLocationSuggestions() {
        const container = document.getElementById("location-suggestions");
        const input = document.getElementById("location");
        renderLocationSuggestions(input.value);
        container.classList.remove("hidden");
      }

      function filterLocationSuggestions(val) {
        renderLocationSuggestions(val);
      }

      function renderLocationSuggestions(val) {
        const container = document.getElementById("location-suggestions");
        const filtered = locationCandidates.filter((c) =>
          c.toLowerCase().includes(val.toLowerCase()),
        );
        if (filtered.length > 0) {
          container.innerHTML = filtered
            .map(
              (c) => `
                    <div class="px-5 py-3 cursor-pointer hover:bg-slate-50 hover:text-blue-600 transition-colors text-sm text-slate-700 text-left"
                         onmousedown="selectLocation('${c}')">
                        ${c}
                    </div>
                `,
            )
            .join("");
        } else {
          container.innerHTML = `
                    <div class="px-5 py-3 text-xs text-slate-400 text-center">
                        无匹配地点
                    </div>
                `;
        }
      }

      function selectLocation(val) {
        const input = document.getElementById("location");
        input.value = val;
        document.getElementById("location-suggestions").classList.add("hidden");
      }

      function hideLocationSuggestions() {
        setTimeout(() => {
          const container = document.getElementById("location-suggestions");
          if (container) {
            container.classList.add("hidden");
          }
        }, 200);
      }

      function nextStep() {
        const type = document.getElementById("type").value;
        const locationVal = document.getElementById("location").value;
        const count = document.getElementById("count").value;
        const target = document.getElementById("target").value;

        if (!type || !locationVal || !count || !target) {
          alert("请填写完整信息");
          return;
        }

        // 携带参数跳转
        const params = new URLSearchParams({
          type,
          location: locationVal,
          count,
          target,
        });
        window.location.href = `form.html?${params.toString()}`;
      }
    </script>
  </body>
</html>
